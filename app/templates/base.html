<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- SEO Meta Tags -->
  <title>{% if current_page == 'home' %}Metadata Cleaner - Remove Image, Document & Video Metadata Online{% elif page_title %}{{ page_title }} - Metadata Cleaner{% else %}Metadata Cleaner{% endif %}</title>
  <meta name="description" content="{% if current_page == 'home' %}Strip sensitive metadata from images, documents, and videos. Quick, secure, and privacy-focused cleaning tool. All processing done locally on the server.{% elif current_page == 'how-it-works' %}Learn how Metadata Cleaner works. Our step-by-step guide shows how we securely remove EXIF data and hidden metadata from your files.{% elif current_page == 'help' %}Get help with Metadata Cleaner. Find answers to common questions about file formats, privacy, and supported file types.{% else %}{{ page_title }}{% endif %}" />
  <meta name="keywords" content="metadata removal, EXIF data remover, image metadata cleaner, document cleaning, video metadata stripper, privacy tool, secure file processing, local processing" />
  <meta name="author" content="Metadata Cleaner" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <meta name="google-site-verification" content="" />
  
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ request.url_root }}{% if current_page == 'home' %}{% elif current_page == 'how-it-works' %}how-it-works{% elif current_page == 'help' %}help{% endif %}" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{% if current_page == 'home' %}Metadata Cleaner - Remove Image, Document & Video Metadata Online{% elif page_title %}{{ page_title }} - Metadata Cleaner{% else %}Metadata Cleaner{% endif %}" />
  <meta property="og:description" content="Strip sensitive metadata from your files. Secure, private, and locally processed metadata removal tool." />
  <meta property="og:url" content="{{ request.url_root }}{% if current_page == 'home' %}{% elif current_page == 'how-it-works' %}how-it-works{% elif current_page == 'help' %}help{% endif %}" />
  <meta property="og:site_name" content="Metadata Cleaner" />

  <!-- Favicon -->

  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Metadata Cleaner - Remove Sensitive Data from Files" />
  <meta name="twitter:description" content="Quick, secure metadata removal for images, documents, and videos. Local processing keeps your files private." />
  
  <!-- Security & Performance -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="theme-color" content="#0e0e10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  
  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Metadata Cleaner",
    "description": "Strip sensitive metadata from images, documents, and videos securely",
    "url": "{{ request.url_root }}",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Web Browser",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "NPR"
    },
    "author": {
      "@type": "Organization",
      "name": "Metadata Cleaner"
    }
  }
  </script>
  
  <script>
    // Apply theme immediately to prevent flash of unstyled content
    (function() {
      const userMode = localStorage.getItem("themeMode");
      const defaultMode = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      const mode = userMode || defaultMode;
      document.documentElement.classList.add(mode + "-mode");
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">{{ "Metadata Cleaner" }}</span>
      </a>
      <nav class="site-nav">
        <a class="nav-link{% if current_page == 'home' %} active{% endif %}" href="/">Home</a>
        <a class="nav-link{% if current_page == 'how-it-works' %} active{% endif %}" href="/how-it-works">How it works</a>
        <a class="nav-link{% if current_page == 'help' %} active{% endif %}" href="/help">Help</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" type="button">☀️</button>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span class="footer-text">Metadata Cleaner - Secure file metadata removal</span>
      <span class="footer-text">&copy; {{ current_year if current_year is defined else "2026" }}</span>
    </div>
  </footer>

  {% block scripts %}
  <script>
    // Theme toggle (dark/light mode) - available on all pages
    (function() {
      "use strict";

      const themeToggle = document.getElementById("theme-toggle");
      const userMode = localStorage.getItem("themeMode");
      const defaultMode = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";

      function applyTheme(mode) {
        const body = document.body;
        const html = document.documentElement;
        if (!body || !html) return;

        if (mode === "dark") {
          body.classList.add("dark-mode");
          body.classList.remove("light-mode");
          html.classList.add("dark-mode");
          html.classList.remove("light-mode");
          if (themeToggle) themeToggle.textContent = "🌙";
        } else {
          body.classList.add("light-mode");
          body.classList.remove("dark-mode");
          html.classList.add("light-mode");
          html.classList.remove("dark-mode");
          if (themeToggle) themeToggle.textContent = "☀️";
        }

        localStorage.setItem("themeMode", mode);
      }

      // Apply theme on page load (remove the inline script classes and apply properly)
      document.documentElement.classList.remove("dark-mode", "light-mode");
      document.body.classList.remove("dark-mode", "light-mode");
      applyTheme(userMode || defaultMode);

      // Handle theme toggle clicks
      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const newMode = document.body.classList.contains("dark-mode") ? "light" : "dark";
          applyTheme(newMode);
        });
      }
    })();
  </script>
  {% endblock %}
</body>
</html>
